services:
  - type: web
    name: ai-audit-backend
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    autoDeploy: true
    healthCheckPath: /api/health
    envVars:
      - key: FRONTEND_ORIGIN
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o-mini

  # Docker로 직접 만들 경우: Dockerfile Path = ./Dockerfile (저장소 루트)
  # 또는 Dockerfile Path = backend/Dockerfile , Docker Context = backend
